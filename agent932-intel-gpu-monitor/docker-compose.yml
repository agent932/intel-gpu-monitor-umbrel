version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: agent932-intel-gpu-monitor_web_1
      APP_PORT: 8847

  web:
    image: ghcr.io/agent932/intel-gpu-monitor-web:latest
    restart: on-failure
    stop_grace_period: 1m
    environment:
      - NODE_ENV=production
      - PORT=8847
      - PLEX_URL=${PLEX_URL:-}
      - PLEX_TOKEN=${PLEX_TOKEN:-}
    privileged: true
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ./data:/data
      - /sys/kernel/debug:/sys/kernel/debug:ro

  widget-server:
    image: ghcr.io/agent932/intel-gpu-monitor-widget:latest
    restart: on-failure
    environment:
      - NODE_ENV=production
      - PORT=80
      - MAIN_SERVER_URL=http://web:8847
    privileged: true
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:ro
