name: Build Intel GPU Monitor

on:
  push:
    branches: [main]
    paths:
      - "agent932-intel-gpu-monitor/**"

env:
  REGISTRY: ghcr.io
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/intel-gpu-monitor-web
  IMAGE_WIDGET: ghcr.io/${{ github.repository_owner }}/intel-gpu-monitor-widget

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: agent932-intel-gpu-monitor
          file: agent932-intel-gpu-monitor/Dockerfile
          push: true
          tags: ${{ env.IMAGE_WEB }}:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push widget-server image
        uses: docker/build-push-action@v5
        with:
          context: agent932-intel-gpu-monitor
          file: agent932-intel-gpu-monitor/Dockerfile.widget
          push: true
          tags: ${{ env.IMAGE_WIDGET }}:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
